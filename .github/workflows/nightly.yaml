name: nightly

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="nightly-$(date -u +%Y-%m-%d)"
          PKG="github.com/NodeOps-app/createos-cli/internal/pkg/version"
          CFG="github.com/NodeOps-app/createos-cli/internal/config"
          COMMIT="${{ github.sha }}"
          LDFLAGS="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Channel=nightly -X ${PKG}.Commit=${COMMIT} -X ${CFG}.OAuthClientID=${{ secrets.OAUTH_CLIENT_ID }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="createos-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          else
            BINARY="createos-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi
          go build -trimpath -ldflags="${LDFLAGS}" -o "${BINARY}" .
          sha256sum "${BINARY}" | awk '{print $1}' > "${BINARY}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: createos-*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Write commit SHA
        run: echo -n "${{ github.sha }}" > commit.txt

      - name: Delete existing nightly release
        run: |
          gh release delete nightly --repo ${{ github.repository }} --yes || true
          git push --delete origin nightly || true

      - name: Create nightly release
        run: |
          gh release create nightly \
            --title "nightly ($(date -u +%Y-%m-%d))" \
            --notes "Automated nightly build from the latest commit on main." \
            --prerelease \
            createos-* commit.txt
