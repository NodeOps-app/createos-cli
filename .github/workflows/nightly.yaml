name: nightly

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="nightly-$(date -u +%Y-%m-%d)"
          PKG="github.com/NodeOps-app/createos-cli/internal/pkg/version"
          CFG="github.com/NodeOps-app/createos-cli/internal/config"
          COMMIT="${{ github.sha }}"
          LDFLAGS="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Channel=nightly -X ${PKG}.Commit=${COMMIT} -X ${CFG}.OAuthClientID=${{ secrets.OAUTH_CLIENT_ID }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="createos-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          else
            BINARY="createos-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi

          go build -trimpath -ldflags="${LDFLAGS}" -o "${BINARY}" .
          sha256sum "${BINARY}" | awk '{print $1}' > "${BINARY}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: createos-*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Set release date
        run: echo "RELEASE_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Delete existing nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --repo ${{ github.repository }} --yes || true
          git push --delete origin nightly || true
        shell: bash

      - name: Write commit SHA
        run: echo -n "${{ github.sha }}" > commit.txt

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "nightly (${{ env.RELEASE_DATE }})"
          prerelease: true
          body: "Automated nightly build from the latest commit on main."
          files: |
            createos-*
            commit.txt
