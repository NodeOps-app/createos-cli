name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="github.com/NodeOps-app/createos-cli/internal/pkg/version"
          CFG="github.com/NodeOps-app/createos-cli/internal/config"
          COMMIT="${{ github.sha }}"
          LDFLAGS="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Channel=stable -X ${PKG}.Commit=${COMMIT} -X ${CFG}.OAuthClientID=${{ secrets.OAUTH_CLIENT_ID }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="createos-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          else
            BINARY="createos-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi

          go build -trimpath -ldflags="${LDFLAGS}" -o "${BINARY}" .
          sha256sum "${BINARY}" | awk '{print $1}' > "${BINARY}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: createos-*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: NodeOps-app/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Upload release assets
        run: gh release upload "${{ github.ref_name }}" createos-* --clobber

      - name: Update homebrew formula
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          ARM64_SHA=$(curl -sL "https://github.com/NodeOps-app/createos-cli/releases/download/${VERSION}/createos-darwin-arm64.sha256")
          AMD64_SHA=$(curl -sL "https://github.com/NodeOps-app/createos-cli/releases/download/${VERSION}/createos-darwin-amd64.sha256")

          sed -i "s/version \".*\"/version \"${VERSION_NUM}\"/" Formula/createos.rb
          sed -i "/on_arm/,/end/{s/sha256 \".*\"/sha256 \"${ARM64_SHA}\"/}" Formula/createos.rb
          sed -i "/on_intel/,/end/{s/sha256 \".*\"/sha256 \"${AMD64_SHA}\"/}" Formula/createos.rb
          sed -i "s|releases/download/v[^/]*/|releases/download/${VERSION}/|g" Formula/createos.rb

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/createos.rb
          git commit -m "Update createos to ${VERSION}"
          git push
